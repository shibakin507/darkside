<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>不死山 不落因果反転地</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://shibakin507.github.io/-NAVI/dist/leaflet.geocsv.js"></script>

<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate.min.js"></script>

<!-- フラッシュするアイコン--> 
<script src="dist/L.Icon.Pulse.js"></script>
<link rel="stylesheet" href="dist/L.Icon.Pulse.css" />

   
<style>
/* =============================
   基本レイアウト
============================= */
html, body, #mapcontainer {
        height: 100%;
        width: 100vw;
        margin: 0;
        padding: 0;
    }


/* =============================
   ポップアップのスタイル
============================= */
.leaflet-popup-content-wrapper, 
.leaflet-popup-tip { background: black; border-color: red; }  
.leaflet-popup-content,
a.leaflet-popup-close-button { color: red !important; font: bold 10pt monospace; }
.leaflet-popup-content-wrapper { border-width: 3px; border-style: solid; } 
.leaflet-popup-tip-container {margin-top: -3px; height: 23px;} 
.leaflet-popup-tip { border-style: solid; border-width: 0 3px 3px 0; }

/* =============================
   Leaflet Rotate関連のスタイル
============================= */

  /* Leaflet Rotate のコンパスを非表示 */
    .leaflet-compass,
    .leaflet-control-rotate {
        display: none !important;
    }
  
   /* iOSのガクガク対策 */
    .leaflet-image-layer,
    .leaflet-map-pane,
    .leaflet-overlay-pane {
       transform: translateZ(0);
       will-change: transform;
       backface-visibility: hidden;
    }

/* ================= 鼓動アニメ ================= */

@keyframes pulseArrow {
    0%   { transform: scale(1);   filter: drop-shadow(0 0 0px red); }
    50%  { transform: scale(1.28); filter: drop-shadow(0 0 14px red); }
    100% { transform: scale(1);   filter: drop-shadow(0 0 0px red); }
}

/* .arrow-svg ではなく、その中にある polygon 全体を揺らす。
   transform-origin を真ん中にするために 50% 50% を指定します。
*/
.arrow-svg.pulsing polygon {
    animation: pulseArrow 1.1s ease-in-out infinite;
    transform-origin: 50% 50%;
}

   
</style>
   
</head>
<body>
   
<div id="mapcontainer"></div>

<audio id="bgm" loop></audio>
   
<script>
/* ==========================================================
   グローバル変数
========================================================== */
let map;
let myMarker = null;

let currentBearing = 0;
const smooth = 0.15; // 地図回転の滑らかさ
let isLocateActive = false;   // ★ GPS状態フラグ
/* ==================================================
   現在地アイコン（▲）
================================================== */
const myArrowIcon = L.divIcon({
    className: '',
    html: `
        <svg class="arrow-svg" width="36" height="48" viewBox="0 0 60 100">
            <!-- 影 -->
            <polygon
                points="34,8 58,100 34,84 10,100"
                fill="rgba(0,0,0,0.5)"
            />
            <!-- 縁取り -->
            <polygon
                points="30,2 56,98 30,80 4,98"
                fill="#ffffff"
            />         
           <!-- 本体 -->
            <polygon
                id="myArrow"
                points="30,6 52,94 30,78 8,94"
                fill="#ff0000"
            />
        </svg>
    `,
    iconSize: [24, 36],
    iconAnchor: [12, 18]
});

/* ==========================================================
   初期化
========================================================== */
function init() {
    
    /* ---------- 地図生成 ---------- */
    map = L.map('mapcontainer', {
        zoomControl: false,
        rotate: true,
        bearing: 0,
        compass: false,
        zoomAnimation: false, //以下iOSのガクガク対策
        zoomAnimationThreshold: 1,
        preferCanvas: true 

   }).setView([35.31764, 138.66840], 11);

    /* ---------- ベース地図 ---------- */
    //クレジット表記
    var gsiattr = "｜<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル</a>";
    var osmattr = "<a href='https://www.openstreetmap.org/copyright' target='_blank'>OpenStreetMap｜<a href='http://fujisanwalker.blog.fc2.com/' target='_blank'>富士山Walker</a>";

    //地図タイル（openstreetmap）
   const osm = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        { attribution: osmattr , maxZoom: 18 }
    ).addTo(map); //デフォルト表示

    /* ---------- オーバーレイ地図 ---------- */
    const gsirehillshademap = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/hillshademap/{z}/{x}/{y}.png',
         { opacity: 0.9, maxNativeZoom: 16, attribution: gsiattr }); // 陰影起伏図
       
    /* ---------- オーバーレイ画像 ---------- */
   const bounds = L.latLngBounds( 
    [35.44710, 138.62548] , [35.34544, 138.71981]
    );
   const baasan = L.imageOverlay(
        'data/baasan.gif', bounds, { opacity: 0.5, maxNativeZoom: 18 }
    );
   const bounds2 = L.latLngBounds( 
    [35.36875, 138.61982] , [35.29509, 138.72367]
    );
   const furakuinga = L.imageOverlay(
        'data/furakuinga.gif', bounds2, { opacity: 1.0, maxNativeZoom: 18 }
    );
   const bounds3 = L.latLngBounds( 
    [35.43410, 138.59905] , [35.36133, 138.75526]
    );
   const batman = L.imageOverlay(
        'data/batman.gif', bounds3, { opacity: 1.0, maxNativeZoom: 18 }
    );
  
   /* ---------- オーバーレイ（ 地図＋画像 ） ---------- */
   const terrainHazardLayer = L.layerGroup([
      gsirehillshademap,  // 下
      baasan,          // 中
      furakuinga,    // 上
      batman,     // 最上
    ]);

/* ---------- マークポイント読込( 外部CSVファイルから ) ---------- */
    function createGeoCsv(url, defaultIcon) {

        const layer = L.geoCsv(null, {
            titles: ['lat', 'lng', 'icon', 'popup'],
            firstLineTitles: false,
            fieldSeparator: ',',

            onEachFeature: (feature, layer) => {
                layer.bindPopup(feature.properties.popup, {
                   maxWidth: 200 //ポップアップ最大幅
});
            },

            pointToLayer: (feature, latlng) => {
                return L.marker(latlng, {
                    //アイコンはフラッシュするアイコンを使用
                    icon:L.icon.pulse({
                        iconSize: [5,5],
                        iconAnchor: [3, 3],
                        color:'#000000'
                    })
                });
            }
        });

        $.ajax({
            beforeSend: xhr => {
                xhr.overrideMimeType('text/csv;charset=UTF-8');
            },
            type: 'GET',
            dataType: 'text',
            url: url
        }).done(data => layer.addData(data));

        return layer;
    }

const makaihantenchi = createGeoCsv('data/zetubou.csv', '');

    /* ---------- GPS（Locate） ---------- */
    const lc = L.control.locate({
        position: "topleft",
        flyTo: false,
        showCompass: false,
        drawMarker: false,
        drawCircle: false,
        setView: 'once',
      　initialZoomLevel: 14, // ← ちょうど良いズームにする（数字小さいほど広く表示）
        watch: true,
        locateOptions: {
            enableHighAccuracy: true
        }
    }).addTo(map);

    map.on('locateactivate', () => {
    isLocateActive = true;
    setArrowColor('#ff0000');
    setArrowPulse(true);   // 既にあれば即鼓動
});

map.on('locatedeactivate', () => {
    isLocateActive = false;
    setArrowColor('#999999');
    setArrowPulse(false);
});


map.on('locationfound', e => {

    if (!myMarker) {
        myMarker = L.marker(e.latlng, {
            icon: myArrowIcon,
            interactive: false
        }).addTo(map);
    } else {
        myMarker.setLatLng([e.latitude + 0.00005, e.longitude]);
    }

    // ★ 1回目でも必ず鼓動させる
    if (isLocateActive) {
        setArrowPulse(true);
        setArrowColor('#ff0000');
    }
});
/* ==================================================
   ▲色変更
================================================== */
function setArrowColor(color) {
    if (!myMarker) return;

    const el = myMarker.getElement();
    if (!el) return;

    const poly = el.querySelector('#myArrow');
    if (poly) poly.setAttribute('fill', color);
}

function setArrowPulse(on) {
    if (!myMarker) return;

    const svg = myMarker.getElement()?.querySelector('.arrow-svg');
    if (!svg) return;

    if (on) {
        svg.classList.add('pulsing');
    } else {
        svg.classList.remove('pulsing');
    }
}

/* ==================================================
   方位センサー（iOS / Android）
================================================== */
function setupOrientation() {

    const requestPermission = () => {

        // iOS
        if (typeof DeviceOrientationEvent?.requestPermission === "function") {
            DeviceOrientationEvent.requestPermission()
                .then(res => {
                    if (res === 'granted') {
                        window.addEventListener(
                            'deviceorientation',
                            handleOrientation,
                            true
                        );
                    }
                })
                .catch(console.error);

        // Android
        } else {
            const eventName =
                ("ondeviceorientationabsolute" in window)
                ? "deviceorientationabsolute"
                : "deviceorientation";

            window.addEventListener(eventName, handleOrientation, true);
        }
    };

    // ★ Locate ボタン起動をユーザー操作として使う
    map.on('locateactivate', requestPermission);
}

function handleOrientation(e) {
    if (!map) return;

    let heading = 0;

    if (e.webkitCompassHeading) {
        heading = e.webkitCompassHeading; // iOS
    } else if (e.alpha != null) {
        heading = e.alpha; // Android
    }

    if (!heading) return;

    const diff = ((heading - currentBearing + 540) % 360) - 180;
    currentBearing += diff * smooth;

    map.setBearing(currentBearing);
}



/* ==========================================================
   BGM関連
========================================================== */
   
/* ---------- BGM用 audio取得 ---------- */
const bgm = document.getElementById("bgm");
/* ---------- 音量 ---------- */
bgm.volume = 1.0;
   
/* ---------- BGM再生関数 ---------- */
function playBGM(src) {
    bgm.src = src;
    bgm.play();
}

/* ---------- BGM停止関数 ---------- */
function stopBGM() {
    bgm.pause();
}

/* ---------- BGM0 ---------- */
const bgmLayer0 = L.layerGroup();

   
/* ---------- BGM1 ---------- */
const bgmLayer1 = L.layerGroup();
bgmLayer1.on("add", function () {
    playBGM("data/bgm1.mp3");
});
bgmLayer1.on("remove", function () {
    // 自分が再生中なら停止
    if (bgm.src.includes("bgm1.mp3")) {
        stopBGM();
    }
});

/* ---------- BGM2 ---------- */
const bgmLayer2 = L.layerGroup();
bgmLayer2.on("add", function () {
    playBGM("data/bgm2.mp3");
});
bgmLayer2.on("remove", function () {
    if (bgm.src.includes("bgm2.mp3")) {
        stopBGM();
    }
});

/* ---------- BGM3 ---------- */
const bgmLayer3 = L.layerGroup();
bgmLayer3.on("add", function () {
    playBGM("data/bgm3.mp3");
});
bgmLayer3.on("remove", function () {
    if (bgm.src.includes("bgm3.mp3")) {
        stopBGM();
    }
});

/* ==========================================================
   レイヤーコンテナの中身
========================================================== */
  const baseMaps = {
    "音を消す":bgmLayer0 ,
    "BGM1を流す": bgmLayer1,
    "BGM2を流す": bgmLayer2,
    "BGM3を流す": bgmLayer3,
     };
   bgmLayer0.addTo(map); // ★ デフォルトON
   const overlays = {
    "不死山地形図": terrainHazardLayer,
    "反転地を示す": makaihantenchi,
   };
   terrainHazardLayer.addTo(map); // ★ デフォルトON
   makaihantenchi.addTo(map); // ★ デフォルトON
     

/* ======================================================
       UIコンテナ配置
====================================================== */

/* ---------- レイヤーコンテナ ------------- */

    L.control.layers(baseMaps, overlays, {
        position: "topright",
        collapsed: true //コンテナへ格納
    }).addTo(map);

/* ---------- 地図スケール ------------- */

    L.control.scale({
       position: "bottomright",
       imperial: false
 }).addTo(map);
    
/* ---------- 方位センサー ---------- */
    setupOrientation();
｝

init();

/* ======================================================
       popup内の写真拡大機能
====================================================== */
function openImage(src) {
    const modal = document.getElementById("imageModal");
    const img = document.getElementById("modalImage");

    img.src = src;
    modal.style.display = "flex";
}

function closeImage() {
    document.getElementById("imageModal").style.display = "none";
}

   
// すべてのポップアップ画像をモーダル対応にする
map.on("popupopen", function(e) {
    const popupEl = e.popup.getElement();
    if (!popupEl) return;
    const images = popupEl.querySelectorAll("img");
    images.forEach(img => {
        img.style.cursor = "pointer";
        img.onclick = () => openImage(img.src);
        if (!popupEl.querySelector(".tap-hint")) {
            const hint = document.createElement("div");
            hint.className = "tap-hint";
            hint.style.fontSize = "12px";
            hint.style.color = "#ff0000"; //赤
            hint.style.textAlign = "center";
            hint.style.marginTop = "4px";
            hint.innerText = "※タップで画像が拡大";
            img.parentNode.appendChild(hint);
        }
    });
});

</script>

<div id="imageModal" style="
    display:none;
    position:fixed;
    z-index:9999;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
">
    <div onclick="closeImage()" style="
        position:absolute;
        top:15px;
        right:20px;
        font-size:28px;
        color:white;
        cursor:pointer;
    ">✕</div>

    <img id="modalImage" style="
        max-width:95%;
        max-height:90%;
        border-radius:10px;
    ">
</div>

</body>
</html>
