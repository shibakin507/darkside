    { name: "Q.黒田・山本 / 山本勘助と俳人梅市の里", file: "https://shibakin507.github.io/-NAVI/data/kuroda.jpg", bounds: [[35.2237, 138.6107], [35.1970, 138.6336]] },
    { name: "R.上稲子 / 平家落人伝説の里をたずねる", file: "https://shibakin507.github.io/-NAVI/data/kamiinago.jpg", bounds: [[35.2836, 138.5172], [35.2504, 138.5455]] },
    { name: "S.上柚野・猫沢 / 柚野の里をめぐる北", file: "https://shibakin507.github.io/-NAVI/data/yuno.jpg", bounds: [[35.2793, 138.5470], [35.2529, 138.5698]] },
    { name: "T.下柚野・大鹿窪 / 柚野の里をめぐる南", file: "https://shibakin507.github.io/-NAVI/data/yuno2.jpg", bounds: [[35.2637, 138.5506], [35.2404, 138.5707]] },
    { name: "U.西山・大久保 / 西山本門寺をたずねる", file: "https://shibakin507.github.io/-NAVI/data/nishiyama.jpg", bounds: [[35.2480, 138.5499], [35.2139, 138.5791]] },
    { name: "V.羽鮒・長貫 / 富士川の歴史", file: "https://shibakin507.github.io/-NAVI/data/habuna.jpg", bounds: [[35.2134, 138.5526], [35.1866, 138.5757]] },
    { name: "W.内房 / 内房の里を歩く", file: "https://shibakin507.github.io/-NAVI/data/utsubusa.jpg", bounds: [[35.2135, 138.5375], [35.1830, 138.5630]] }
];

// グローバル変数の宣言
var scene, camera, renderer, controls, terrainMesh, terrainMaterial, rawHeights = [];
var selectedImage = new Image();
var currentCourse = null;        

// 固定設定値の定義
const FIXED_H = 0.03;  // 地形の高さ倍率
const FIXED_O1 = 0.00;  // 色別標高タイルの不透明度
const FIXED_O2 = 1.00;  // 陰影起伏タイルの不透明度

// ナビゲーション関連の変数
var watchId = null;
var isNavActive = false;
var userMarker = null;
var currentBearing = 0;
const smooth = 0.15;
var currentTileBounds = { x1:0, y1:0, x2:0, y2:0, z:14 };


/**
 * コントロールパネルの初期化関数
 */
function initControlPanel() {
    var select = document.getElementById("courseSelect");
    courseData.forEach((course, index) => {
        var opt = document.createElement("option");
        opt.value = index;
        opt.innerText = course.name;
        select.appendChild(opt);
    });
    onCourseChange();
}


/**
 * コース変更時のイベントハンドラ
 */
function onCourseChange() {
    var index = document.getElementById("courseSelect").value;
    currentCourse = courseData[index];
    
    selectedImage = new Image();
    selectedImage.crossOrigin = "anonymous";
    var url = currentCourse.file;
    
    if (url.indexOf("https://", 8) !== -1) {
        url = url.substring(url.indexOf("https://", 8));
    }
    selectedImage.src = url;

    // ナビゲーション動作中にコースが変わったら一旦終了させる
    if (isNavActive) {
        stopNavigation();
    }
}


/**
 * Three.js (3D空間) の初期化関数
 */
function initThree() {
    var el = document.getElementById("webgl");
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(el.clientWidth, el.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.85;
    el.appendChild(renderer.domElement);
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    // ライティング
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(100, -100, 200);
    scene.add(dirLight);

    // カメラ
    camera = new THREE.PerspectiveCamera(45, el.clientWidth / el.clientHeight, 1, 15000);
    camera.position.set(0, -250, 250);
    camera.up.set(0, 0, 1);
    
    // コントロール
    controls = new THREE.TrackballControls(camera, renderer.domElement);
    renderLoop();
}


/**
 * 描画アニメーションループ関数
 */
function renderLoop() {
    requestAnimationFrame(renderLoop);
    if (controls) controls.update();
    renderer.render(scene, camera);
}


/**
 * 緯度経度からタイル座標（相対ピクセル位置）への変換関数
 */
function latLngToTileRelative(lat, lng, z, x1, y1) {
    var pixelX = (lng + 180) / 360 * Math.pow(2, z) * 256;
    var pixelY = (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z) * 256;
    var originX = x1 * 256;
    var originY = y1 * 256;
    return { x: pixelX - originX, y: pixelY - originY };
}


/**
 * 3Dレンダリング開始関数
 */
function start3DRender() {
    if (!currentCourse || !selectedImage.src) return;

    document.getElementById("status").style.display = "block";
    
    var nwLat = currentCourse.bounds[0][0];
    var nwLng = currentCourse.bounds[0][1];
    var seLat = currentCourse.bounds[1][0];
    var seLng = currentCourse.bounds[1][1];
    
    var z = 14; 
    var x1 = Math.floor((nwLng + 180) / 360 * Math.pow(2, z));
    var y1 = Math.floor((1 - Math.log(Math.tan(nwLat * Math.PI / 180) + 1 / Math.cos(nwLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
    var x2 = Math.floor((seLng + 180) / 360 * Math.pow(2, z));
    var y2 = Math.floor((1 - Math.log(Math.tan(seLat * Math.PI / 180) + 1 / Math.cos(seLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));

    var tx_count = x2 - x1 + 1, ty_count = y2 - y1 + 1;
    if (tx_count * ty_count > 120) z = 13; 
    
    x1 = Math.floor((nwLng + 180) / 360 * Math.pow(2, z));
    y1 = Math.floor((1 - Math.log(Math.tan(nwLat * Math.PI / 180) + 1 / Math.cos(nwLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
    x2 = Math.floor((seLng + 180) / 360 * Math.pow(2, z));
    y2 = Math.floor((1 - Math.log(Math.tan(seLat * Math.PI / 180) + 1 / Math.cos(seLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
    tx_count = x2 - x1 + 1; 
    ty_count = y2 - y1 + 1;

    // 現在のレンダリング範囲を保持
    currentTileBounds = { x1: x1, y1: y1, x2: x2, y2: y2, z: z };

    var cvs = document.createElement("canvas"); 
    cvs.width = tx_count * 256; 
    cvs.height = ty_count * 256;
    var ctx = cvs.getContext("2d"), count = 0, total = tx_count * ty_count;

    for (let x = x1; x <= x2; x++) {
        for (let y = y1; y <= y2; y++) {
            let img = new Image(); 
            img.crossOrigin = "anonymous";
            img.onload = () => {
                ctx.drawImage(img, (x - x1) * 256, (y - y1) * 256);
                if (++count === total) build3D(ctx, cvs.width, cvs.height, x1, y1, x2, y2, z);
            };
            img.src = `https://cyberjapandata.gsi.go.jp/xyz/dem_png/${z}/${x}/${y}.png`;
        }
    }
}


/**
 * 3D地形モデル生成関数
 */
function build3D(demCtx, w, h, x1, y1, x2, y2, z) {
    if (terrainMesh) { 
        scene.remove(terrainMesh); 
        terrainMesh.geometry.dispose(); 
        terrainMaterial.dispose(); 
    }
    // ナビ中であればユーザーマーカーも一旦外す
    if (userMarker) {
        scene.remove(userMarker);
        userMarker = null;
    }

    var data = demCtx.getImageData(0, 0, w, h).data;
    var seg = 126;
    var geom = new THREE.PlaneGeometry(200, 200 * (h / w), seg, seg);
    rawHeights = [];
    var pos = geom.attributes.position.array;

    for (let i = 0; i < geom.attributes.position.count; i++) {
        let ix = Math.floor((i % (seg + 1)) * (w / (seg + 1)));
        let iy = Math.floor(Math.floor(i / (seg + 1)) * (h / (seg + 1)));
        let p = (iy * w + ix) * 4;
        let v = data[p] * 65536 + data[p + 1] * 256 + data[p + 2];
        let hgt = (v < 8388608) ? v * 0.01 : (v - 16777216) * 0.01;
        rawHeights.push(hgt);
        pos[i * 3 + 2] = hgt * FIXED_H; 
    }
    geom.computeVertexNormals();

    loadTextures(x1, y1, x2, y2, z, (tex0, tex1, tex2, tex3) => {
        terrainMaterial = new THREE.MeshPhongMaterial({ map: tex0, side: THREE.DoubleSide });
        
        terrainMaterial.onBeforeCompile = (shader) => {
            shader.uniforms.overlay1 = { value: tex1 };
            shader.uniforms.overlay2 = { value: tex2 };
            shader.uniforms.overlay3 = { value: tex3 };
            shader.uniforms.opacity1 = { value: FIXED_O1 }; 
            shader.uniforms.opacity2 = { value: FIXED_O2 }; 
            shader.uniforms.opacity3 = { value: parseFloat(document.getElementById("o3Slide").value) };
            terrainMaterial.userData.shader = shader;
            
            shader.fragmentShader = `uniform sampler2D overlay1; uniform sampler2D overlay2; uniform sampler2D overlay3; uniform float opacity1; uniform float opacity2; uniform float opacity3;\n` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
                #include <map_fragment>
                vec4 reliefCol = texture2D(overlay1, vUv);
                vec4 shadeCol  = texture2D(overlay2, vUv);
                vec4 customCol = texture2D(overlay3, vUv);

                vec3 base = diffuseColor.rgb;
                base = mix(base, reliefCol.rgb, opacity1);
                base *= mix(vec3(1.0), shadeCol.rgb, opacity2);
                base = mix(base, customCol.rgb, opacity3);

                diffuseColor.rgb = base;
            `);
        };

        terrainMesh = new THREE.Mesh(geom, terrainMaterial);
        scene.add(terrainMesh);
        document.getElementById("status").style.display = "none";
        update3D();
        
        geom.computeBoundingSphere();
        controls.target.copy(geom.boundingSphere.center);
        camera.position.set(geom.boundingSphere.center.x, geom.boundingSphere.center.y - 200, 200);
    });
}


/**
 * 各種テクスチャロード・結合関数
 */
function loadTextures(x1, y1, x2, y2, z, callback) {
    var tx = x2 - x1 + 1;
    var ty = y2 - y1 + 1;
    var layers = ["std", "relief", "hillshademap", "custom"];
    var texs = [], loaded = 0;

    layers.forEach((lyr, idx) => {
        let cvs = document.createElement("canvas");
        
        if (lyr === "custom") {
            var scale = 3; 
            cvs.width = tx * 256 * scale;
            cvs.height = ty * 256 * scale;
            let ctx = cvs.getContext("2d");

            if (currentCourse && selectedImage.src) {
                var nwLat = currentCourse.bounds[0][0];
                var nwLng = currentCourse.bounds[0][1];
                var seLat = currentCourse.bounds[1][0];
                var seLng = currentCourse.bounds[1][1];

                var pNW = latLngToTileRelative(nwLat, nwLng, z, x1, y1);
                var pSE = latLngToTileRelative(seLat, seLng, z, x1, y1);

                ctx.drawImage(selectedImage, pNW.x * scale, pNW.y * scale, (pSE.x - pNW.x) * scale, (pSE.y - pNW.y) * scale);
            }
            texs[idx] = new THREE.CanvasTexture(cvs);
            if (++loaded === 4) callback(texs[0], texs[1], texs[2], texs[3]);
            return;
        }

        cvs.width = tx * 256;
        cvs.height = ty * 256;
        let ctx = cvs.getContext("2d");
        let count = 0;
        for (let x = x1; x <= x2; x++) {
            for (let y = y1; y <= y2; y++) {
                let img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => {
                    ctx.drawImage(img, (x - x1) * 256, (y - y1) * 256);
                    if (++count === tx * ty) {
                        texs[idx] = new THREE.CanvasTexture(cvs);
                        if (++loaded === 4) callback(texs[0], texs[1], texs[2], texs[3]);
                    }
                };
                img.src = `https://cyberjapandata.gsi.go.jp/xyz/${lyr}/${z}/${x}/${y}.png`;
            }
        }
    });
}


/**
 * 3D状態リアルタイム更新関数
 */
function update3D() {
    if (!terrainMesh) return;
    var o3 = parseFloat(document.getElementById("o3Slide").value);
    document.getElementById("o3Val").innerText = o3.toFixed(2);
    
    var pos = terrainMesh.geometry.attributes.position.array;
    for (let i = 0; i < rawHeights.length; i++) { 
        pos[i * 3 + 2] = rawHeights[i] * FIXED_H; 
    }
    terrainMesh.geometry.attributes.position.needsUpdate = true;
    
    if (terrainMaterial.userData.shader) {
        terrainMaterial.userData.shader.uniforms.opacity1.value = FIXED_O1;
        terrainMaterial.userData.shader.uniforms.opacity2.value = FIXED_O2;
        terrainMaterial.userData.shader.uniforms.opacity3.value = o3;
    }
}


/* ==================================================
   ナビゲーションシステム機能
================================================== */

/**
 * ナビゲーションの開始/停止切り替え
 */
function toggleNavigation() {
    if (!terrainMesh) {
        alert("先に3D表示を行ってください。");
        return;
    }
    if (isNavActive) {
        stopNavigation();
    } else {
        startNavigation();
    }
}

/**
 * ナビゲーション開始
 */
function startNavigation() {
    if (!navigator.geolocation) {
        alert("お使いの端末はGPS機能に対応していません。");
        return;
    }

    isNavActive = true;
    var btn = document.getElementById("navBtn");
    btn.innerText = "ナビ停止";
    btn.classList.add("active");

    // 位置情報取得開始
    watchId = navigator.geolocation.watchPosition(
        handleLocationFound,
        handleLocationError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );

    // 方位センサー有効化
    requestOrientationPermission();
}

/**
 * ナビゲーション停止
 */
function stopNavigation() {
    isNavActive = false;
    var btn = document.getElementById("navBtn");
    btn.innerText = "ナビ開始";
    btn.classList.remove("active");

    if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    window.removeEventListener('deviceorientation', handleOrientation, true);
    window.removeEventListener('deviceorientationabsolute', handleOrientation, true);

    if (userMarker) {
        scene.remove(userMarker);
        userMarker = null;
    }
}

/**
 * 位置情報取得成功時のコールバック
 */
function handleLocationFound(position) {
    var lat = position.coords.latitude;
    var lng = position.coords.longitude;

    // 現在地が選択中のコース範囲外（境界ボックスの外）か判定[cite: 1, 2]
    var nwLat = currentCourse.bounds[0][0];
    var nwLng = currentCourse.bounds[0][1];
    var seLat = currentCourse.bounds[1][0];
    var seLng = currentCourse.bounds[1][1];

    // 緯度は南（小）〜北（大）、経度は西（小）〜東（大）
    var minLat = Math.min(nwLat, seLat);
    var maxLat = Math.max(nwLat, seLat);
    var minLng = Math.min(nwLng, seLng);
    var maxLng = Math.max(nwLng, seLng);

    if (lat < minLat || lat > maxLat || lng < minLng || lng > maxLng) {
        alert("現在位置はコースの範囲外です");
        stopNavigation();
        return;
    }

    // 範囲内の場合、3D空間上の平面座標へマッピング
    updateUser3DPosition(lat, lng);
}

/**
 * 位置情報取得失敗時のコールバック
 */
function handleLocationError(error) {
    console.error("位置情報の取得に失敗しました:", error);
}
/**
 * 緯度経度から3D空間内の座標(X, Y, Z)を計算し、矢印マーカーを更新
 */
function updateUser3DPosition(lat, lng) {
    if (!terrainMesh) return;

    var b = currentTileBounds;
    var p = latLngToTileRelative(lat, lng, b.z, b.x1, b.y1);
    
    var totalW = (b.x2 - b.x1 + 1) * 256;
    var totalH = (b.y2 - b.y1 + 1) * 256;

    var threeX = (p.x / totalW) * 200 - 100;
    var threeY = 100 * (totalH / totalW) - (p.y / totalH) * (200 * (totalH / totalW));
    var threeZ = 10 * FIXED_H; 

    // 地形頂点から現在位置直下の高さを取得
    var seg = 126;
    var ix = Math.round((p.x / totalW) * seg);
    var iy = Math.round((p.y / totalH) * seg);
    if (ix >= 0 && ix <= seg && iy >= 0 && iy <= seg) {
        var vertexIndex = iy * (seg + 1) + ix;
        if (rawHeights[vertexIndex] !== undefined) {
            threeZ = (rawHeights[vertexIndex] * FIXED_H) + 1.5; // 地形の少し上に配置
        }
    }

    // マーカーが存在しない場合は、赤い矢印（3Dオブジェクト）を作成
    if (!userMarker) {
        userMarker = new THREE.Group(); // 円錐と立方体をまとめるグループ

        var material = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        // 矢印の頭（円錐：ConeGeometry）
        // 引数: (底面の半径, 高さ, 放射状の分割数)
        var coneGeom = new THREE.ConeGeometry(2, 5, 16);
        var cone = new THREE.Mesh(coneGeom, material);
        // Three.jsの標準で円錐はY軸の正の向きを向くため、進行方向（Y軸プラス方向）に合わせる
        cone.position.y = 2.5; 
        userMarker.add(cone);

        // 矢印の軸（立方体：BoxGeometry）
        // 引数: (幅, 高さ, 奥行き)
        var boxGeom = new THREE.BoxGeometry(1, 4, 1);
        var box = new THREE.Mesh(boxGeom, material);
        box.position.y = -0.5;
        userMarker.add(box);

        // 地形に対して矢印が寝てしまわないよう、X軸を90度回転させて垂直に立たせる
        userMarker.rotation.x = Math.PI / 2;

        scene.add(userMarker);
    }

    userMarker.position.set(threeX, threeY, threeZ);
}
/**
 * 方位センサーのデータ処理と地図回転・マーカー回転
 */
function handleOrientation(e) {
    if (!isNavActive) return;
    
    let heading = e.webkitCompassHeading || e.alpha;
    if (!heading) return;

    const diff = ((heading - currentBearing + 540) % 360) - 180;
    currentBearing += diff * smooth;

    var angleRad = (currentBearing * Math.PI) / 180;

    // ★追加: ユーザーの矢印マーカーを進行方向（反時計回り）に回転させる
    if (userMarker) {
        // userMarker全体のrotation.y（立ち上げた状態での方位角）を同期
        // headingが時計回り（北=0, 東=90）なのを、Three.jsの回転方向（反時計回り）に変換
        userMarker.rotation.y = -angleRad;
    }

    // カメラの水平回転処理（既存のまま）
    if (controls) {
        var dx = camera.position.x - controls.target.x;
        var dy = camera.position.y - controls.target.y;
        var distanceSegment = Math.sqrt(dx * dx + dy * dy);

        camera.position.x = controls.target.x - distanceSegment * Math.sin(angleRad);
        camera.position.y = controls.target.y - distanceSegment * Math.cos(angleRad);
        camera.lookAt(controls.target);
    }
}
    
/**
 * 方位センサーのアクセス許可申請[cite: 2]
 */
function requestOrientationPermission() {
    if (typeof DeviceOrientationEvent?.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission().then(res => {
            if (res === 'granted')
                window.addEventListener('deviceorientation', handleOrientation, true);
        }).catch(err => console.error(err));
    } else {
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    }
}



// ページ読み込み完了時の初期化処理
window.onload = () => { 
    initControlPanel(); 
    initThree(); 
};

// ウィンドウサイズ変更時のリサイズ処理
window.onresize = () => {
    var el = document.getElementById("webgl");
    renderer.setSize(el.clientWidth, el.clientHeight);
    camera.aspect = el.clientWidth / el.clientHeight;
    camera.updateProjectionMatrix();
};
