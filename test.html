<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* 画面左上隅のGPSナビゲーションボタン */
        #nav-btn-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 100;
            display: inline-block;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            background-color: #ffffff;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
            padding: 0;
        }
        .nav-btn:hover { background-color: #f4f4f4; }
        .nav-btn:active { background-color: #e8e8e8; transform: scale(0.95); }
        .nav-btn svg { width: 22px; height: 22px; fill: #444444; transition: fill 0.2s; }
        
        /* GPS稼働中のスタイル（青く光る） */
        .nav-btn.active { background-color: #e6f2ff; }
        .nav-btn.active svg { fill: #0066cc; }

        .tooltip {
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .tooltip::before {
            content: "";
            position: absolute;
            right: 100%;
            top: 50%;
            margin-top: -4px;
            border-width: 4px;
            border-style: solid;
            border-color: transparent rgba(0, 0, 0, 0.8) transparent transparent;
        }

        @media (hover: hover) {
            #nav-btn-container:hover .tooltip { opacity: 1; }
        }

        /* コントロールパネル */
        #ui-container {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .ui-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.03);
            padding: 10px;
            border-radius: 8px;
        }
        .ui-group label { font-size: 13px; font-weight: bold; color: #333; text-align: center; white-space: nowrap; }
        .slider { width: 100%; height: 10px; -webkit-appearance: none; background: #ddd; outline: none; border-radius: 5px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #0066cc; cursor: pointer; }
        .slider::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: #0066cc; cursor: pointer; }

        .credit {
            position: absolute;
            bottom: 5px;
            right: 15px;
            font-size: 11px;
            color: #555;
            padding: 2px 5px;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8), -1px -1px 2px rgba(255, 255, 255, 0.8);
        }
        .credit a { color: #0055aa; text-decoration: none; font-weight: bold; }

        @media (max-width: 500px) {
            #ui-container { gap: 8px; padding: 10px; bottom: 40px; }
            .ui-group { padding: 6px; gap: 4px; }
            .ui-group label { font-size: 11px; }
            .credit { left: 15px; right: auto; bottom: 8px; }
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- GPS現在地追跡ボタン -->
    <div id="nav-btn-container">
        <button id="btn-geolocation" class="nav-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1c0-.55-.45-1-1-1s-1 .45-1 1v2.06C6.83 3.52 3.52 6.83 3.06 11H1c-.55 0-1 .45-1 1s.45 1 1 1h2.06c.46 4.17 3.77 7.48 7.94 7.94V23c0 .55.45 1 1 1s1-.45 1-1v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23c.55 0 1-.45 1-1s-.45-1-1-1h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
            </svg>
        </button>
        <div id="btn-tooltip" class="tooltip">現在位置を追跡</div>
    </div>

   <!-- コントロールパネル -->
    <div id="ui-container">
        <div class="ui-group">
            <label id="label-rotate" for="rotate-slider">水平回転</label>
            <input type="range" id="rotate-slider" class="slider" min="0" max="360" value="0">
        </div>
        <div class="ui-group">
            <label id="label-height" for="height-slider">上下移動</label>
            <input type="range" id="height-slider" class="slider" min="-100" max="150" value="-100">
        </div>
        <div class="ui-group">
            <label id="label-zoom" for="zoom-slider">拡大・縮小</label>
            <input type="range" id="zoom-slider" class="slider" min="80" max="600" value="270">
        </div>
        <div class="ui-group">
            <label id="label-opacity" for="opacity-slider">画像追加 (透過度: 100%)</label>
            <input type="range" id="opacity-slider" class="slider" min="0" max="100" value="100">
        </div>
    </div>



    <div class="credit">
        <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">地理院タイル</a>をもとに<a href="http://fujisanwalker.blog.fc2.com/" target="_blank">富士山Walker</a>が作成
    </div>

    <script>
        // --- 立体地図のカバー範囲設定（ZOOM = 12における限界） ---
        const bounds = {
            nw: { lat: 35.46066996213613, lng: 138.515625 },
            se: { lat: 35.17380831799959, lng: 138.8671875 }
        };

       
        const overlayImgUrl = "test.jpg";
        const overlayBounds = {
            nw: { lat: 35.46066996213613, lng: 138.515625 },
            se: { lat: 35.17380831799959, lng: 138.8671875 }
        };

        let centerCoords = { lat: 35.3606, lng: 138.7275 };
        const ZOOM = 12;
        const STD_ZOOM = ZOOM + 2; 
        const ELEVATION_SCALE = 0.02; 

        const OPACITY_HILLSHADE = 0.40; 
        const OPACITY_STD = 1.00;       

        function lngToTileX(lng, zoom) { return Math.floor((lng + 180) / 360 * Math.pow(2, zoom)); }
        function latToTileY(lat, zoom) { return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom)); }
        function tileXToLng(x, zoom) { return x / Math.pow(2, zoom) * 360 - 180; }
        function tileYToLat(y, zoom) {
            const n = Math.PI - 2 * Math.PI * y / Math.pow(2, zoom);
            return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
        }

        const minX = lngToTileX(bounds.nw.lng, ZOOM);
        const maxX = lngToTileX(bounds.se.lng, ZOOM);
        const minY = latToTileY(bounds.nw.lat, ZOOM);
        const maxY = latToTileY(bounds.se.lat, ZOOM);

        const tileWidthCount = maxX - minX + 1;
        const tileHeightCount = maxY - minY + 1;

        const totalLngWidth = tileXToLng(maxX + 1, ZOOM) - tileXToLng(minX, ZOOM);
        const totalLatHeight = tileYToLat(minY, ZOOM) - tileYToLat(maxY + 1, ZOOM);
        
        const sceneWidth = tileWidthCount * 100;
        const sceneHeight = tileHeightCount * 100;

        const minLng = tileXToLng(minX, ZOOM);
        const maxLat = tileYToLat(minY, ZOOM);

        function coordsToScenePos(lat, lng) {
            const x = ((lng - minLng) / totalLngWidth) * sceneWidth - (sceneWidth / 2);
            const z = ((maxLat - lat) / totalLatHeight) * sceneHeight - (sceneHeight / 2);
            return { x, z };
        }

        // --- Three.js 初期化 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(200, 500, 200);
        scene.add(dirLight);

        const segmentsX = tileWidthCount * 32; 
        const segmentsY = tileHeightCount * 32;

        const geometry = new THREE.PlaneGeometry(sceneWidth, sceneHeight, segmentsX, segmentsY);
        geometry.rotateX(-Math.PI / 2);

        const material = new THREE.MeshStandardMaterial({
            color: 0xffffff, roughness: 0.8, metalness: 0.1, side: THREE.DoubleSide
        });
        const terrainMesh = new THREE.Mesh(geometry, material);
        scene.add(terrainMesh);

        // --- 現在位置3Dマーカー（地球の中心を指す仕様） ---
        let currentPosGroup = null; 
        let arrowMesh = null;       

        function createCoolMarker() {
    currentPosGroup = new THREE.Group();

    // 1. 地面のベースサークル
    const circleGeo = new THREE.RingGeometry(0, 5, 32);
    // ★ color を 0x0066cc（青） から 0xcc0000（赤） に変更
    const circleMat = new THREE.MeshBasicMaterial({ color: 0xcc0000, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
    const circleMesh = new THREE.Mesh(circleGeo, circleMat);
    circleMesh.rotateX(-Math.PI / 2); 
    currentPosGroup.add(circleMesh);

    // 2. サイバー風の輪郭線
    const edgeGeo = new THREE.RingGeometry(4.8, 5, 32);
    // ★ color を 0x00aaff（水色） から 0xff5555（明るい赤） に変更
    const edgeMat = new THREE.MeshBasicMaterial({ color: 0xff5555, side: THREE.DoubleSide });
    const edgeMesh = new THREE.Mesh(edgeGeo, edgeMat);
    edgeMesh.rotateX(-Math.PI / 2);
    currentPosGroup.add(edgeMesh);

    // 3. ナビ用立体矢印（先端を地球の中心＝真下に向ける）
    const coneGeo = new THREE.ConeGeometry(1.8, 6, 4);
    // ★ color を 0x0077ff（青） から 0xff0000（鮮やかな赤） に変更
    //   emissive（自発光） も 0x002255（深青） から 0x550000（深赤） に変更すると質感が良くなります
    const coneMat = new THREE.MeshStandardMaterial({ 
        color: 0xff0000, roughness: 0.3, metalness: 0.8, emissive: 0x550000 
    });
    arrowMesh = new THREE.Mesh(coneGeo, coneMat);
    
    arrowMesh.rotateX(Math.PI); 
    arrowMesh.position.y = 6.0; 
    
    currentPosGroup.add(arrowMesh);
    currentPosGroup.visible = false; 
    scene.add(currentPosGroup);
}

        // --- 地理院タイル読み込み・合成構造 ---
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = tileWidthCount * 1024; canvas.height = tileHeightCount * 1024;

        const hillshadeCanvas = document.createElement('canvas');
        const hillshadeCtx = hillshadeCanvas.getContext('2d');
        hillshadeCanvas.width = canvas.width; hillshadeCanvas.height = canvas.height;

        const stdCanvas = document.createElement('canvas');
        const stdCtx = stdCanvas.getContext('2d');
        stdCanvas.width = canvas.width; stdCanvas.height = canvas.height;

        const demCanvas = document.createElement('canvas');
        const demCtx = demCanvas.getContext('2d');
        demCanvas.width = tileWidthCount * 256; demCanvas.height = tileHeightCount * 256;

        let loadedCount = 0;
        const totalTiles = tileWidthCount * tileHeightCount;
        const totalTasks = (totalTiles * 2) + (totalTiles * 16) + 1; 

        let targetPos = coordsToScenePos(centerCoords.lat, centerCoords.lng);
        let baseTargetY = 15; 
        let demDataGlobal = null; 

        const imgOverlay = new Image();
        let texture = null;

        // --- 修正前 ---
 imgOverlay.crossOrigin = "anonymous";
 imgOverlay.src = overlayImgUrl;
 imgOverlay.onload = () => { checkProgress(); };

        function updateTextureCanvas() {
            const currentOpacity = parseFloat(document.getElementById('opacity-slider').value) / 100;
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = OPACITY_HILLSHADE; ctx.drawImage(hillshadeCanvas, 0, 0);
            ctx.globalAlpha = OPACITY_STD; ctx.globalCompositeOperation = "multiply"; ctx.drawImage(stdCanvas, 0, 0);
            ctx.globalCompositeOperation = "source-over"; ctx.globalAlpha = 1.0;

            const startX = ((overlayBounds.nw.lng - minLng) / totalLngWidth) * canvas.width;
            const startY = ((maxLat - overlayBounds.nw.lat) / totalLatHeight) * canvas.height;
            const endX = ((overlayBounds.se.lng - minLng) / totalLngWidth) * canvas.width;
            const endY = ((maxLat - overlayBounds.se.lat) / totalLatHeight) * canvas.height;
            
            ctx.globalAlpha = currentOpacity; ctx.drawImage(imgOverlay, startX, startY, endX - startX, endY - startY);
            ctx.globalAlpha = 1.0; 
            if (texture) texture.needsUpdate = true;
        }

        for (let ty = minY; ty <= maxY; ty++) {
            for (let tx = minX; tx <= maxX; tx++) {
                const offsetX2x = (tx - minX) * 1024; const offsetY2x = (ty - minY) * 1024;
                const offsetX1x = (tx - minX) * 256;  const offsetY1x = (ty - minY) * 256;

                const imgHillshade = new Image();
                imgHillshade.crossOrigin = "anonymous";
                imgHillshade.src = `https://cyberjapandata.gsi.go.jp/xyz/hillshademap/${ZOOM}/${tx}/${ty}.png`;
                imgHillshade.onload = () => { hillshadeCtx.drawImage(imgHillshade, offsetX2x, offsetY2x, 1024, 1024); checkProgress(); };

                const imgDem = new Image();
                imgDem.crossOrigin = "anonymous";
                imgDem.src = `https://cyberjapandata.gsi.go.jp/xyz/dem_png/${ZOOM}/${tx}/${ty}.png`;
                imgDem.onload = () => { demCtx.drawImage(imgDem, offsetX1x, offsetY1x, 256, 256); checkProgress(); };

                const pMinX = tx * 4; const pMinY = ty * 4;
                for (let dy = 0; dy < 4; dy++) {
                    for (let dx = 0; dx < 4; dx++) {
                        const imgStd = new Image();
                        imgStd.crossOrigin = "anonymous";
                        imgStd.src = `https://cyberjapandata.gsi.go.jp/xyz/std/${STD_ZOOM}/${pMinX + dx}/${pMinY + dy}.png`;
                        imgStd.onload = () => { stdCtx.drawImage(imgStd, offsetX2x + (dx * 256), offsetY2x + (dy * 256), 256, 256); checkProgress(); };
                    }
                }
            }
        }

        function checkProgress() {
            loadedCount++;
            if (loadedCount === totalTasks) { updateTextureCanvas(); applyDataToTerrain(); }
        }

        function getElevation(r, g, b) {
            const x = r * 65536 + g * 256 + b;
            return x < 8388608 ? x * 0.01 : (x - 16777216) * 0.01;
        }

        function getTerrainYAt(x, z) {
    if (!demDataGlobal) return 15;
    const percentX = (x + sceneWidth / 2) / sceneWidth;
    const percentY = (z + sceneHeight / 2) / sceneHeight;
    
    // 東端・南端のフチでデータ異常（壁）が出るのを防ぐため、外周1ピクセル内側を安全に参照します
    const pixelX = Math.max(0, Math.min(Math.floor(percentX * demCanvas.width), demCanvas.width - 2));
    const pixelY = Math.max(0, Math.min(Math.floor(percentY * demCanvas.height), demCanvas.height - 2));
    
    const idx = (pixelY * demCanvas.width + pixelX) * 4;
    
    // データが万が一取得できなかったり、エラー値（無効値）の場合は隣の標高やデフォルト値で保護
    if (demDataGlobal[idx] === undefined || (demDataGlobal[idx] === 128 && demDataGlobal[idx+1] === 0 && demDataGlobal[idx+2] === 0)) {
        return 0; // 海洋や無効値の場合の処理
    }
    
    return getElevation(demDataGlobal[idx], demDataGlobal[idx+1], demDataGlobal[idx+2]) * ELEVATION_SCALE;
}

        function applyDataToTerrain() {
            texture = new THREE.CanvasTexture(canvas);
            material.map = texture; material.needsUpdate = true;
            demDataGlobal = demCtx.getImageData(0, 0, demCanvas.width, demCanvas.height).data;
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < posAttr.count; i++) { posAttr.setY(i, getTerrainYAt(posAttr.getX(i), posAttr.getZ(i))); }
            baseTargetY = getTerrainYAt(targetPos.x, targetPos.z);
            geometry.computeVertexNormals(); posAttr.needsUpdate = true;

            createCoolMarker(); 
            updateCameraPosition();
        }

        // --- カメラ・UI制御 ---
        const rotateSlider = document.getElementById('rotate-slider');
        const heightSlider = document.getElementById('height-slider');
        const zoomSlider = document.getElementById('zoom-slider');
        const opacitySlider = document.getElementById('opacity-slider');

        const labelRotate = document.getElementById('label-rotate');
        const labelHeight = document.getElementById('label-height');
        const labelZoom = document.getElementById('label-zoom');
        const labelOpacity = document.getElementById('label-opacity');
        
        function updateCameraPosition() {
            const cameraDistance = parseFloat(zoomSlider.value);
            const verticalOffset = cameraDistance * Math.sin(Math.PI / 4); 
            const horizontalRadius = cameraDistance * Math.cos(Math.PI / 4);
            const angleRad = (parseFloat(rotateSlider.value) * Math.PI) / 180;
            const currentTargetY = baseTargetY + parseFloat(heightSlider.value);

            camera.position.set(
                targetPos.x + horizontalRadius * Math.sin(angleRad),
                currentTargetY + verticalOffset,
                targetPos.z + horizontalRadius * Math.cos(angleRad)
            );
            camera.lookAt(targetPos.x, currentTargetY, targetPos.z);

            labelRotate.innerText = `水平回転`;
            labelHeight.innerText = `上下移動`;
            labelZoom.innerText = `拡大・縮小`;
        }

        rotateSlider.addEventListener('input', updateCameraPosition);
        heightSlider.addEventListener('input', updateCameraPosition);
        zoomSlider.addEventListener('input', updateCameraPosition);
        opacitySlider.addEventListener('input', () => {
            labelOpacity.innerText = `画像追加 (透過度： ${opacitySlider.value}%)`; updateTextureCanvas();
        });

        // --- 本番用：リアルタイム位置情報追跡システム ---
        let watchId = null; 
        const geoBtn = document.getElementById('btn-geolocation');
        const tooltip = document.getElementById('btn-tooltip');

        geoBtn.addEventListener('click', () => {
            // すでに追跡中の場合は、追跡をストップする
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                geoBtn.classList.remove('active');
                tooltip.innerText = "現在位置を追跡";
                if (currentPosGroup) currentPosGroup.visible = false;
                return;
            }

            if (!navigator.geolocation) {
                alert("お使いのブラウザはGPS位置情報に対応していません。");
                return;
            }

            // リアルタイム追跡を開始
            geoBtn.classList.add('active');
            tooltip.innerText = "追跡を停止";

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    // ユーザーが3D地図の描画エリア内にいるかチェック
                    if (userLat > bounds.nw.lat || userLat < bounds.se.lat || 
                        userLng < bounds.nw.lng || userLng > bounds.se.lng) {
                        alert(`現在、富士山周辺の地図エリア外（緯度: ${userLat.toFixed(4)}, 経度: ${userLng.toFixed(4)}）にいるため、マーカーを表示できません。`);
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                        geoBtn.classList.remove('active');
                        tooltip.innerText = "現在位置を追跡";
                        return;
                    }

                    // 3D空間座標に変換して更新
                    const newPos = coordsToScenePos(userLat, userLng);
                    targetPos.x = newPos.x;
                    targetPos.z = newPos.z;
                    
                    // 現在の地点の標高をDEMデータから再計算
                    baseTargetY = getTerrainYAt(targetPos.x, targetPos.z);

                    // マーカーの位置を更新して可視化
                    if (currentPosGroup) {
                        currentPosGroup.position.set(targetPos.x, baseTargetY, targetPos.z);
                        currentPosGroup.visible = true;
                    }

                    // カメラを現在地に追従
                    updateCameraPosition();
                },
                (error) => {
                    let errorMsg = "位置情報の取得に失敗しました。";
                    switch(error.code) {
                        case error.PERMISSION_DENIED: errorMsg = "位置情報の利用許可が拒否されました。設定を確認してください。"; break;
                        case error.POSITION_UNAVAILABLE: errorMsg = "位置情報が利用できません（電波状況等）。"; break;
                        case error.TIMEOUT: errorMsg = "位置情報の取得がタイムアウトしました。"; break;
                    }
                    alert(errorMsg);
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                    geoBtn.classList.remove('active');
                    tooltip.innerText = "現在位置を追跡";
                },
                {
                    enableHighAccuracy: true, // 高精度GPSモード
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });

        // --- アニメーションループ ---
        function animate() {
            requestAnimationFrame(animate);
            // 演出：真下を指す矢印をフワフワと上下浮遊
            if (currentPosGroup && currentPosGroup.visible) {
                const time = Date.now() * 0.003;
                arrowMesh.position.y = 6.0 + Math.sin(time) * 0.4;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
